<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tucson</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --green1: #E8F1EC;
  --green2: #C9DED0;
  --green3: #A9CBB4;
  --green4: #88B897;
  --green5: #669975;
  --green6: #557F61;
  --green7: #44654D;
  --green8: #334B39;
  --green9: #223124;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--green1);
  color: #222;
}

/* NAVBAR */
header {
  background: var(--green6);
  border-bottom: 1px solid var(--green9);
  padding: 0 20px;
  height: 70px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-center {
  display: flex;
  justify-content: center;
}

.header-right {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

.logo-img {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
  margin-top: 0px;
}

.site-title {
  font-weight: 600;
  color: var(--green2);
  font-size: 2rem;
  letter-spacing: 0.5px;
}

.home-btn {
  background: var(--green2);
  color: var(--green9);
  padding: 8px 16px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 500;
  font-size: 1.3rem;
  transition: 0.2s ease;
}

.home-btn:hover {
  background: var(--green4);
  transform: translateY(-1px);
}

.cart {
  cursor: pointer;
  font-size: 1.5rem;
}

.cart span {
  background: var(--green7);
  color: white;
  border-radius: 50%;
  padding: 2px 7px;
  margin-left: 5px;
  font-size: 1rem;
}

/* MAIN CONTENT */
.main {
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 60px 20px 20px 20px;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 12px;
  max-width: 600px;
  width: 100%;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.card h1 {
  font-family: 'Playfair Display', serif;
  color: var(--green8);
}

.card p {
  color: var(--green7);
  margin-bottom: 20px;
}

.btn {
  display: inline-block;
  padding: 12px 20px;
  background: var(--green6);
  color: white;
  border-radius: 6px;
  text-decoration: none;
  margin: 10px;
}

/* SECTIONS */
section {
  padding: 40px 20px;
  max-width: 1000px;
  margin: auto;
}

section h2 {
  text-align: center;
  font-family: 'Playfair Display', serif;
  color: var(--green8);
  margin-bottom: 25px;
}

.shop-section h2 {
  font-size: 2.4rem;
  margin-bottom: 30px;
}

/* SHOP */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.product-card {
  background: white;
  padding: 15px;
  border-radius: 8px;
  text-align: center;
  border: 1px solid var(--green9);
}

.product-card img {
  max-width: 50%;
  border-radius: 6px;
}

/* Quantity controls */
.qty-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin: 10px 0;
}

.qty-controls button {
  padding: 6px 10px;
  background: var(--green7);
  color: var(--green2);
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.qty-controls input {
  width: 50px;
  text-align: center;
  padding: 5px;
}

/* FOOTER */
footer {
  background: var(--green6);
  color: var(--green2);
  text-align: center;
  padding: 25px;
  margin-top: 40px;
}

</style>
</head>

<body>

<header>
  <div class="header-left">
    <img src="logo.png" class="logo-img">
    <div class="site-title">Dorothy's Dream</div>
  </div>
  <div class="header-center">
    <a href="index.html" class="home-btn">Home</a>
  </div>
  <div class="header-right">
    <div class="cart" onclick="goToCart()">🛒 <span id="cart-count">0</span></div>
  </div>
</div>
</header>

<div class="main">
  <div class="card">
    <h1>Tucson Chapter</h1>
    <p>
      Join the Tucson movement to make our streets safer through awareness,
      community action, and responsible driving.
    </p>

    <a href="pledge.html" class="btn">Take the Pledge</a>
    <a href="partner.html" class="btn">Become a Partner</a>
  </div>
</div>

<!-- SHOP -->
<section class="shop-section">
  <h2>Stickers & Awareness Gear</h2>

  <div class="products">

    <!-- Sticker 1 -->
    <div class="product-card">
      <img src="sticker3.png">
      <h3>Tucson Sticker Collection</h3>
      <p>$10.00</p>

      <div class="qty-controls">
        <button onclick="changeQty(this,-1)">−</button>
        <input type="number" value="1" min="1">
        <button onclick="changeQty(this,1)">+</button>
      </div>

      <button class="btn primary"
        onclick="addToCart(this,'Reflective Safety Sticker',3)">
        Add to Cart
      </button>
    </div>
    </div>

  </div>
</section>

<footer>
  © 2026 Drive Safe Tucson — Dorothy’s Dream
</footer>

<script>
function changeQty(button, amount) {
  const input = button.parentElement.querySelector("input");
  let value = parseInt(input.value) || 1;
  value += amount;
  if (value < 1) value = 1;
  input.value = value;
}

function addToCart(button, name, price) {
  const card = button.parentElement;
  const quantity = parseInt(card.querySelector("input").value);

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({ name, price, quantity });
  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartCount();
}

function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let count = cart.reduce((sum, item) => sum + item.quantity, 0);
  document.getElementById("cart-count").textContent = count;
}

function goToCart() {
  window.location.href = "checkout.html";
}

updateCartCount();
</script>

</body>
</html>
