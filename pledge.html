<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join the Pledge</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --green1: #E8F1EC;
  --green2: #C9DED0;
  --green3: #A9CBB4;
  --green4: #88B897;
  --green5: #669975;
  --green6: #557F61;
  --green7: #44654D;
  --green8: #334B39;
  --green9: #223124;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(#fff);
  color: #222;
}

header {
  background: var(--green6);
  border-bottom: 1px solid var(--green9);
  text-align: center;
  padding: 35px 20px;
}

header h2 {
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  color: var(--green2);
}

.form-section {
  display: flex;
  justify-content: center;
  padding: 80px 20px;
}

.container {
  width: 100%;
  max-width: 520px;
  background: white;
  padding: 45px 35px;
  border-radius: 14px;
  border: 1px solid var(--green9);
  box-shadow: 0 12px 30px rgba(0,0,0,0,06);
}

.comtainer p {
  margin-top: 0;
  margin-bottom: 25px;
  color: var(--green8);
}

input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 18px;
  border-radius: 8px;
  border: 1px solid var(--green8);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  background: white;
  transition: 0.2s ease;
}

input:focus,
textarea:focus {
  outline: none;
  border-color: var(--green9);
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  background: var(--green6);
  color: var(--green1);
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: var(--green4);
}

.success {
  text-align: center;
  font-size: 18px;
  color: var(--green8)
}

</style>
</head>

<body>

<header>
  <h2>Join the Safe Driving Pledge</h2>
</header>

<section class="form-section">
  <div class="container" id="form-container">
  <p>Commit to driving with awareness and receive a free sticker.</p>

  <input type="text" id="name" placeholder="Your Name" required>
  <input type="email" id="email" placeholder="Email Address" required>
  <input type="shipping_address" id="shipping_address" placeholder="Shipping Address" required>

  <button onclick="submitForm()">Join the Pledge</button>
</div>
</section>

<script>
function submitForm() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const shipping_address = document.getElementById("shipping_address").value;

  if (!name || !email || !shipping_address) {
    alert("Please complete all fields.");
    return;
  }

  document.getElementById("form-container").innerHTML = `
    <p class='success'>
      ✅ Thank you for joining!<br>
      Your free sticker is reserved.
    </p>
    <button onclick="goHome()">Return to Home</button>
  `;
}

function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
