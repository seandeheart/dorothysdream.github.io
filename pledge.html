<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join the Pledge</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --cream: #f4efe6;
  --sage: #4d5b3c;
  --olive: #74895b;
  --green: #428537;
  --dark-green: #336529;
  --tan: #d8c3a5;
  --mesquite: #5e4725;
  --copperwood: #6e5024;
  --desert-amber: #a27d46;
  --sandstone: #957649;
  --driftwood: #826e51;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--cream);
  color: var(--mesquite);
}

header {
  background: var(--tan);
  border-bottom: 1px solid var(--sandstone);
  text-align: center;
  padding: 35px 20px;
}

header h2 {
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  color: var(--dark-green);
}

.form-section {
  display: flex;
  justify-content: center;
  padding: 80px 20px;
}

.container {
  width: 100%;
  max-width: 520px;
  background: white;
  padding: 45px 35px;
  border-radius: 14px;
  border: 1px solid var(--sandstone);
  box-shadow: 0 12px 30px rgba(0,0,0,0,06);
}

.comtainer p {
  margin-top: 0;
  margin-bottom: 25px;
  color: var(--driftwood);
}

input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 18px;
  border-radius: 8px;
  border: 1px solid var(--sandstone);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  background: white;
  transition: 0.2s ease;
}

input:focus,
textarea:focus {
  outline: none;
  border-color: var(--dark-green);
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  background: var(--dark-green);
  color: var(--cream);
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: var(--sage);
}

.success {
  text-align: center;
  font-size: 18px;
  color: var(--dark-green)
}

</style>
</head>

<body>

<header>
  <h2>Join the Safe Driving Pledge</h2>
</header>

<section class="form-section">
  <div class="container" id="form-container">
  <p>Commit to driving with awareness and receive a free sticker.</p>

  <input type="text" id="name" placeholder="Your Name" required>
  <input type="email" id="email" placeholder="Email Address" required>
  <input type="shipping_address" id="shipping_address" placeholder="Shipping Address" required>

  <button onclick="submitForm()">Join the Pledge</button>
</div>
</section>

<script>
function submitForm() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const shipping_address = document.getElementById("shipping_address").value;

  if (!name || !email || !shipping_address) {
    alert("Please complete all fields.");
    return;
  }

  document.getElementById("form-container").innerHTML = `
    <p class='success'>
      ✅ Thank you for joining!<br>
      Your free sticker is reserved.
    </p>
    <button onclick="goHome()">Return to Home</button>
  `;
}

function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
